<!DOCTYPE html>
<html>
	<head>
		<link type="text/css" href="{{ url_for('static', filename='css/styles.css')}}" rel="stylesheet" />
		<title>{{title}}</title>

	</head>
	<body>

		{% block content -%}
			 {%- block mainmenu -%}
				<ul class="mainmenu">
					{% for m in menu -%}
						<li><a href="{{m['url']}}">{{m['title']}}</a></li>
					 {% endfor -%}
				</ul>
		 	{% endblock mainmenu -%}

			<div class="clear"></div>

			{%- block title_bl -%}
				<h1>{{title}}</h1>
			{% endblock title_bl -%}

		{% endblock content -%}



	</body>
</html>
